services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: backend_temp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d backend_temp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./workspaces:/app/workspaces
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/backend_temp
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ENVIRONMENT: dev
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.worker.celery_app.celery_app worker -Q high,default,low --loglevel=info
    env_file:
      - .env
    volumes:
      - ./workspaces:/app/workspaces
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/backend_temp
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ENVIRONMENT: dev
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

volumes:
  pg_data:
